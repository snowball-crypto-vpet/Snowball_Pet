<!DOCTYPE html>
<html>
<head>
    <title>Snowball Pet</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 1.5s ease;
            background: #a2d2ff;
            font-family: sans-serif;
            overflow: hidden;
        }
        body.night { background: #2c3e50; }

        #grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25%;
            background: #7cfc00;
            transition: background 1.5s ease;
            z-index: -1;
        }
        body.night #grass { background: #004d00; }

        #bunny-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #bunny-sprite {
            font-size: 150px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        .panel {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #7cfc00;
            margin: 10px;
            width: 320px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            border-radius: 12px;
            border: none;
            background: #a2d2ff;
            color: white;
            box-shadow: 0 4px #7fb5e6;
        }

        button:disabled { background: #ccc; box-shadow: none; }
    </style>
</head>
<body>

    <div id="grass"></div>

    <div class="panel">
        <div id="stats" style="font-weight:bold; font-size: 20px;">Hunger: 100 | Coins: 0</div>
        <div id="inv">Carrots in bag: 0</div>
        <button onclick="feedBunny()">🥕 Feed Carrot</button>
        <button onclick="goSleep()">💤 Sleep</button>
    </div>

    <div id="bunny-container">
        <div id="bunny-sprite">🐰</div>
    </div>

    <div class="panel">
        <strong>🥕 FOOD SHOP 🥕</strong><br>
        <button onclick="buyFood()">Buy 1 Carrot (20 Coins)</button>
    </div>

    <script>
        let hunger = 100;
        let coins = 0;
        let carrots = 0;
        
        let hasEatenBefore = false;
        let hasSleptBefore = false;

        function updateUI() {
            document.getElementById('stats').innerText = `Hunger: ${hunger} | Coins: ${coins}`;
            document.getElementById('inv').innerText = `Carrots in bag: ${carrots}`;
        }

        function buyFood() {
            if (coins >= 20) {
                coins -= 20;
                carrots += 1;
                updateUI();
            } else {
                alert("Not enough coins! Go to sleep to earn more.");
            }
        }

        function feedBunny() {
            document.body.classList.remove('night');
            if (carrots > 0) {
                if (hunger < 100) {
                    carrots -= 1;
                    hunger += 20;
                    if (hunger > 100) hunger = 100;
                    updateUI();
                    
                    if (hasEatenBefore === false) {
                        alert("Crunch crunch! Snowball loved that carrot.");
                        hasEatenBefore = true;
                    }
                }
            } else {
                alert("You need to buy carrots first!");
            }
        }

        function goSleep() {
            document.body.classList.add('night');
            coins += 30;
            updateUI();

            if (hasSleptBefore === false) {
                alert("Snowball is dreaming of giant carrots...");
                hasSleptBefore = true;
            }
        }

        // --- NEW: THE LIVING TIMER ---
        // This runs every 5000 milliseconds (5 seconds)
        setInterval(function() {
            if (hunger > 0) {
                hunger -= 2; // Lose 2 hunger points
                if (hunger < 0) hunger = 0;
                updateUI();
            }
        }, 5000);

        updateUI();
    </script>
</body>
</html>
