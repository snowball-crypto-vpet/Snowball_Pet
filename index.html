<!DOCTYPE html>
<html>
<head>
    <title>Snowball Pet</title>
    <link rel="icon" type="image/png" href="https://em-content.zobj.net/source/apple/391/rabbit_1f407.png">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: all 1.5s ease;
            background: #a2d2ff; font-family: sans-serif; overflow: hidden;
        }
        body.night { background: #2c3e50; }

        /* SCREENS */
        #home-screen, #shop-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #a2d2ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #shop-screen { background: rgba(162, 210, 255, 0.95); display: none; z-index: 200; }

        .save-list {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px; border-radius: 20px; width: 280px; margin-top: 10px;
        }
        .save-item {
            background: white; margin: 5px 0; padding: 10px;
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 2px solid #4361ee;
        }

        #game-container { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: space-around; }
        #grass { position: absolute; bottom: 0; width: 100%; height: 20%; background: #7cfc00; z-index: -1; }
        body.night #grass { background: #004d00; }

        .panel {
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 20px; text-align: center; border: 4px solid #7cfc00;
            width: 85%; max-width: 320px;
        }

        #bunny-sprite { font-size: 100px; animation: bounce 2s infinite ease-in-out; position: relative; color: white; }
        #sitter-emoji { position: absolute; right: -50px; bottom: 0; font-size: 40px; display: none; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        button {
            padding: 10px 15px; font-size: 14px; margin: 5px; cursor: pointer;
            border-radius: 15px; border: none; background: #4cc9f0; color: white;
            font-weight: bold; box-shadow: 0 4px #4361ee;
        }
        .shop-btn { background: #ff9800; box-shadow: 0 4px #e68a00; width: 100%; font-size: 18px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; border: 2px solid white; margin: 5px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 style="color: white; text-shadow: 2px 2px #4361ee;">SNOWBALL PET</h1>
        <div class="panel">
            <input type="text" id="saveName" placeholder="Enter Game Name..." style="padding:10px; border-radius:10px; border:none; width:80%;">
            <button onclick="createNewGame()" style="background:#7cfc00; box-shadow: 0 4px #5db500;">CREATE NEW GAME</button>
        </div>
        <div class="save-list" id="saveList"></div>
    </div>

    <div id="shop-screen">
        <h1 style="color: white;">🛒 SNOWBALL SHOP</h1>
        <div class="panel">
            <h3 id="shop-coins">Coins: 0</h3>
            <button onclick="buyFood()">Buy Carrot (20c)</button>
            <button id="sitterBtn" onclick="buySitter()">Hire Sitter (100c)</button>
            <button id="fireBtn" onclick="fireSitter()" style="background:#ff4d4d; display:none;">Fire Sitter</button>
            
            <hr>
            <strong>Change Snowball's Color (50c)</strong><br>
            <div class="color-dot" style="background: white;" onclick="changeColor('white')"></div>
            <div class="color-dot" style="background: #ffc8dd;" onclick="changeColor('#ffc8dd')"></div>
            <div class="color-dot" style="background: #bde0fe;" onclick="changeColor('#bde0fe')"></div>
            <div class="color-dot" style="background: #ffafcc;" onclick="changeColor('#ffafcc')"></div>
            
            <hr>
            <button onclick="closeShop()" style="background:#aaa; box-shadow:0 4px #888;">CLOSE SHOP</button>
        </div>
    </div>

    <div id="game-container">
        <div id="grass"></div>
        <div class="panel">
            <h2 id="current-game-name" style="margin:0; color:#4361ee;">Game</h2>
            <div id="stats" style="font-size: 18px; font-weight: bold;">Hunger: 100 | Coins: 75</div>
            <div id="inv" style="font-weight: bold;">Carrots: 30</div>
            <div id="sitter-status" style="color: #007bff; display: none;">🛡️ Sitter Active</div>
            <button onclick="feedBunny()">🥕 Feed</button>
            <button onclick="goSleep()">💤 Sleep</button>
        </div>

        <div id="bunny-sprite">🐰<div id="sitter-emoji">👩‍🍼</div></div>

        <div class="panel">
            <button class="shop-btn" onclick="openShop()">🛍️ OPEN SHOP</button>
            <button onclick="showHome()" style="background:#aaa; box-shadow: 0 4px #888; margin-top:10px;">SAVE & QUIT</button>
        </div>
    </div>

    <script>
        let currentGameId = null;
        let stats = { hunger: 100, coins: 75, carrots: 30, hasSitter: false, name: "", color: "white" };

        function updateUI() {
            document.getElementById('stats').innerText = `Hunger: ${stats.hunger} | Coins: ${stats.coins}`;
            document.getElementById('inv').innerText = `Carrots: ${stats.carrots}`;
            document.getElementById('current-game-name').innerText = stats.name;
            document.getElementById('shop-coins').innerText = `Coins: ${stats.coins}`;
            document.getElementById('bunny-sprite').style.color = stats.color;
            
            const sitterStatus = document.getElementById('sitter-status');
            const sitterBtn = document.getElementById('sitterBtn');
            const fireBtn = document.getElementById('fireBtn');
            const sitterEmoji = document.getElementById('sitter-emoji');

            if (stats.hasSitter) {
                sitterStatus.style.display = "block";
                sitterBtn.style.display = "none";
                fireBtn.style.display = "inline-block";
                sitterEmoji.style.display = "block";
            } else {
                sitterStatus.style.display = "none";
                sitterBtn.style.display = "inline-block";
                fireBtn.style.display = "none";
                sitterEmoji.style.display = "none";
            }
        }

        function createNewGame() {
            const nameInput = document.getElementById('saveName');
            const name = nameInput.value || "New Game";
            const id = "snowball_" + Date.now();
            const newStats = { hunger: 100, coins: 75, carrots: 30, hasSitter: false, name: name, color: "white" };
            localStorage.setItem(id, JSON.stringify(newStats));
            nameInput.value = "";
            renderSaveList();
        }

        function renderSaveList() {
            const list = document.getElementById('saveList');
            list.innerHTML = "<strong>CHOOSE A SAVE:</strong>";
            for (let i = 0; i < localStorage.length; i++) {
                const id = localStorage.key(i);
                if (id && id.startsWith("snowball_")) {
                    const data = JSON.parse(localStorage.getItem(id));
                    const div = document.createElement('div');
                    div.className = "save-item";
                    div.innerHTML = `
                        <span onclick="loadGame('${id}')" style="cursor:pointer; flex:1;"><b>${data.name}</b> (💰${data.coins})</span>
                        <button class="delete-btn" onclick="deleteGame('${id}')">DEL</button>
                    `;
                    list.appendChild(div);
                }
            }
        }

        function loadGame(id) {
            currentGameId = id;
            stats = JSON.parse(localStorage.getItem(id));
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            updateUI();
        }

        function saveGame() { if (currentGameId) localStorage.setItem(currentGameId, JSON.stringify(stats)); }

        function deleteGame(id) { if (confirm("Delete this save?")) { localStorage.removeItem(id); renderSaveList(); } }

        function openShop() { document.getElementById('shop-screen').style.display = 'flex'; updateUI(); }
        function closeShop() { document.getElementById('shop-screen').style.display = 'none'; }

        function buyFood() {
            if (stats.coins >= 20) { stats.coins -= 20; stats.carrots += 1; updateUI(); saveGame(); }
            else alert("Need coins!");
        }

        function buySitter() {
            if (stats.coins >= 100) { stats.hasSitter = true; stats.coins -= 100; updateUI(); saveGame(); }
            else alert("Need coins!");
        }

        function fireSitter() {
            if (confirm("Fire the sitter?")) { stats.hasSitter = false; updateUI(); saveGame(); }
        }

        function changeColor(newColor) {
            if (stats.color === newColor) return;
            if (stats.coins >= 50) {
                stats.coins -= 50;
                stats.color = newColor;
                updateUI();
                saveGame();
            } else { alert("Need 50 coins for a new color!"); }
        }

        function showHome() { saveGame(); document.getElementById('home-screen').style.display = 'flex'; document.getElementById('game-container').style.display = 'none'; renderSaveList(); }

        function feedBunny() {
            document.body.classList.remove('night');
            if (stats.carrots > 0 && stats.hunger < 100) {
                stats.carrots -= 1; stats.hunger = Math.min(100, stats.hunger + 20);
                updateUI(); saveGame();
            }
        }

        function goSleep() { document.body.classList.add('night'); stats.coins += 30; updateUI(); saveGame(); }

        setInterval(() => {
            if (document.getElementById('game-container').style.display === 'flex') {
                if (stats.hasSitter) stats.hunger = 100;
                else if (stats.hunger > 0) stats.hunger -= 5;
                updateUI(); saveGame();
            }
        }, 2000);

        renderSaveList();
    </script>
</body>
</html>
