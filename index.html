<!DOCTYPE html>
<html>
<head>
    <title>Snowball Pet</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, #a2d2ff 75%, #7cfc00 75%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #bunny-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #bunny-sprite {
            font-size: 150px;
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
            cursor: pointer;
            user-select: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        #ui {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px 40px;
            border-radius: 30px;
            margin-bottom: 40px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #7cfc00;
        }

        #stats {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
            border-radius: 15px;
            border: none;
            background: #a2d2ff;
            color: white;
            box-shadow: 0 5px #7fb5e6;
            transition: 0.1s;
        }

        button:active {
            box-shadow: 0 2px #7fb5e6;
            transform: translateY(3px);
        }

        button:hover {
            background: #89c2ff;
        }
    </style>
</head>
<body>

    <div id="bunny-container">
        <div id="bunny-sprite" onclick="petBunny()">🐰</div>
    </div>

    <div id="ui">
        <div id="stats">Hunger: 100 | Coins: 0</div>
        <button onclick="feedBunny()">🍎 Feed Snowball</button>
        <button onclick="goSleep()">💤 Put to Sleep</button>
    </div>

    <script>
        // These are Snowball's "Brain" variables
        let hunger = 100;
        let coins = 0;

        function updateUI() {
            document.getElementById('stats').innerText = `Hunger: ${hunger} | Coins: ${coins}`;
        }

        function feedBunny() {
            if (hunger < 100) {
                hunger += 10;
                coins += 5; // You earn coins for taking care of him!
                if (hunger > 100) hunger = 100;
                updateUI();
            } else {
                alert("Snowball is too full for more apples!");
            }
        }

        function goSleep() {
            alert("Snowball is dreaming of giant carrots...");
            coins += 15;
            hunger -= 20; // Sleeping makes him hungry
            if (hunger < 0) hunger = 0;
            updateUI();
        }

        function petBunny() {
            // Extra secret: click the bunny directly!
            coins += 1;
            updateUI();
        }
    </script>
</body>
</html>
