<!DOCTYPE html>
<html>
<head>
    <title>Snowball Pet</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            /* This transition makes the color change smooth like a real sunset */
            transition: background 2s ease;
            background: linear-gradient(to bottom, #a2d2ff 75%, #7cfc00 75%);
            font-family: sans-serif;
            overflow: hidden;
        }

        /* This is the Night Time class */
        body.night {
            background: linear-gradient(to bottom, #2c3e50 75%, #004d00 75%);
        }

        #bunny-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #bunny-sprite {
            font-size: 150px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        #ui {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 40px;
            text-align: center;
            border: 4px solid #7cfc00;
        }

        button {
            padding: 12px 20px;
            font-size: 18px;
            margin: 5px;
            cursor: pointer;
            border-radius: 15px;
            border: none;
            background: #a2d2ff;
            color: white;
            box-shadow: 0 4px #7fb5e6;
        }
    </style>
</head>
<body>

    <div id="bunny-container">
        <div id="bunny-sprite">🐰</div>
    </div>

    <div id="ui">
        <div id="stats">Hunger: 100 | Coins: 0</div>
        <button onclick="feedBunny()">🍎 Feed</button>
        <button onclick="goSleep()">💤 Sleep</button>
    </div>

    <script>
        let hunger = 100;
        let coins = 0;

        function updateUI() {
            document.getElementById('stats').innerText = `Hunger: ${hunger} | Coins: ${coins}`;
        }

        function feedBunny() {
            // Wake up and turn the sky blue!
            document.body.classList.remove('night');
            
            if (hunger < 100) {
                hunger += 10;
                coins += 5;
                updateUI();
            }
        }

        function goSleep() {
            // Turn the sky dark!
            document.body.classList.add('night');
            
            coins += 15;
            hunger -= 20;
            updateUI();
        }
    </script>
</body>
</html>
