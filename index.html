<!DOCTYPE html>
<html>
<head>
    <title>Snowball Pet</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around; /* Changed this to fit buttons better */
            transition: all 1.5s ease;
            background: #a2d2ff;
            font-family: sans-serif;
            overflow: hidden;
        }
        body.night { background: #2c3e50; }

        #grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20%;
            background: #7cfc00;
            transition: background 1.5s ease;
            z-index: -1;
        }
        body.night #grass { background: #004d00; }

        #bunny-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        #bunny-sprite {
            font-size: 120px; /* Slightly smaller to fit everything */
            animation: bounce 2s infinite ease-in-out;
            position: relative;
        }

        /* The Babysitter Emoji */
        #sitter-emoji {
            position: absolute;
            right: -60px;
            bottom: 0;
            font-size: 50px;
            display: none; /* Hidden until hired */
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .panel {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #7cfc00;
            width: 90%; /* Fits phone width better */
            max-width: 320px;
        }

        button {
            padding: 8px 12px;
            font-size: 14px;
            margin: 3px;
            cursor: pointer;
            border-radius: 12px;
            border: none;
            background: #a2d2ff;
            color: white;
            box-shadow: 0 4px #7fb5e6;
        }

        button:disabled { background: #ccc; box-shadow: none; }
        .status-text { font-size: 13px; color: #555; margin: 2px; }
    </style>
</head>
<body>

    <div id="grass"></div>

    <div class="panel">
        <div id="stats" style="font-weight:bold; font-size: 18px;">Hunger: 100 | Coins: 0</div>
        <div class="status-text" id="inv">Carrots in bag: 0</div>
        <div class="status-text" id="sitter-status" style="color: blue; font-weight: bold;"></div>
        <button onclick="feedBunny()">🥕 Feed</button>
        <button onclick="goSleep()">💤 Sleep</button>
    </div>

    <div id="bunny-container">
        <div id="bunny-sprite">
            🐰
            <div id="sitter-emoji">👩‍🍼</div>
        </div>
    </div>

    <div class="panel">
        <strong>🏪 SHOP 🏪</strong><br>
        <button onclick="buyFood()">Buy Carrot (20c)</button>
        <button id="sitterBtn" onclick="buySitter()">Hire Sitter (100c)</button>
    </div>

    <script>
        let hunger = 100;
        let coins = 0;
        let carrots = 0;
        let hasSitter = false;
        
        let hasEatenBefore = false;

        function updateUI() {
            document.getElementById('stats').innerText = `Hunger: ${hunger} | Coins: ${coins}`;
            document.getElementById('inv').innerText = `Carrots in bag: ${carrots}`;
            
            if (hasSitter) {
                document.getElementById('sitter-status').innerText = "🛡️ Sitter is Active";
                document.getElementById('sitterBtn').innerText = "Hired!";
                document.getElementById('sitterBtn').disabled = true;
                document.getElementById('sitter-emoji').style.display = "block";
            }
        }

        function buyFood() {
            if (coins >= 20) {
                coins -= 20;
                carrots += 1;
                updateUI();
            } else { alert("Not enough coins!"); }
        }

        function buySitter() {
            if (coins >= 100) {
                coins -= 100;
                hasSitter = true;
                updateUI();
                alert("The babysitter is here!");
            } else { alert("You need 100 coins!"); }
        }

        function feedBunny() {
            document.body.classList.remove('night');
            if (carrots > 0) {
                if (hunger < 100) {
                    carrots -= 1;
                    hunger += 20;
                    if (hunger > 100) hunger = 100;
                    updateUI();
                    if (!hasEatenBefore) { alert("Crunch!"); hasEatenBefore = true; }
                }
            } else { alert("Buy carrots!"); }
        }

        function goSleep() {
            document.body.classList.add('night');
            coins += 30;
            updateUI();
        }

        // --- UPDATED TIMER: FASTER HUNGER ---
        setInterval(function() {
            if (hasSitter) {
                if (hunger < 100) {
                    hunger = 100;
                    updateUI();
                }
            } else {
                if (hunger > 0) {
                    hunger -= 5; // Dropped from 2 to 5!
                    if (hunger < 0) hunger = 0;
                    updateUI();
                }
            }
        }, 3000); // Runs every 3 seconds instead of 5!

        updateUI();
    </script>
</body>
</html>
