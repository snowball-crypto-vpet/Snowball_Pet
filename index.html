<!DOCTYPE html>
<html>
<head>
    <title>Snowball Pet</title>
    <link rel="icon" type="image/png" href="https://em-content.zobj.net/source/apple/391/rabbit_1f407.png">
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 1s; background: #a2d2ff; font-family: sans-serif; overflow: hidden; }
        body.night { background: #1a1a2e; }
        #home-screen, #shop-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #a2d2ff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #shop-screen { background: rgba(162, 210, 255, 0.98); display: none; z-index: 200; }
        #game-container { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .panel { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 20px; text-align: center; border: 4px solid #7cfc00; width: 80%; max-width: 300px; z-index: 10; margin: 10px 0; }
        #bunny-sprite { font-size: 100px; animation: bounce 2s infinite ease-in-out; position: relative; margin: 20px 0; z-index: 5; }
        .sitter-style { position: absolute; right: -50px; bottom: 0; font-size: 40px; }
        #friend-sprite { position: absolute; left: -60px; bottom: 10px; font-size: 50px; }
        #xp-container { width: 100%; background: #333; height: 14px; border-radius: 7px; margin: 10px 0; overflow: hidden; border: 2px solid #4361ee; }
        #xp-fill { background: linear-gradient(90deg, #ffbe0b, #fb5607); height: 100%; width: 0%; transition: width 0.5s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 12px; border: none; background: #4cc9f0; color: white; font-weight: bold; box-shadow: 0 4px #4361ee; }
        #wake-btn { background: #ffbe0b; color: #333; display: none; font-size: 18px; padding: 15px; }
    </style>
</head>
<body>
    <div id="home-screen">
        <h1>SNOWBALL PET</h1>
        <div class="panel">
            <input type="text" id="saveName" placeholder="Pet Name..." style="padding:10px; width:80%;">
            <br><br><button onclick="createNewGame()">START</button>
        </div>
        <div id="saveList" style="margin-top:20px;"></div>
    </div>
    <div id="shop-screen">
        <h2>🛒 SHOP</h2>
        <div class="panel">
            <h3 id="shop-coins">Coins: 0</h3>
            <button onclick="buyFood()">Carrot (20c)</button>
            <button onclick="useGym()">Gym (5c / +20 XP)</button>
            <button onclick="doWork()">💼 Work (+10c)</button>
            <button id="sitterBtn" onclick="buySitter()">Hire Sitter (100c)</button>
            <div id="pet-shop" style="display:none; margin-top:10px; border-top:1px solid #ccc;">
                <strong>Pets (Lvl 10):</strong><br>
                <button onclick="buyFriend('🐶')">Dog (200c)</button>
                <button onclick="buyFriend('🐱')">Cat (200c)</button>
                <button onclick="buyFriend('🐟')">Fish (200c)</button>
            </div>
            <br><button onclick="closeShop()" style="background:#aaa;">CLOSE</button>
        </div>
    </div>
    <div id="game-container">
        <div class="panel">
            <h2 id="current-game-name">Pet</h2>
            <div id="lvl-display">Lvl 1</div>
            <div id="xp-container"><div id="xp-fill"></div></div>
            <div id="stats">Hunger: 100 | Coins: 75</div>
            <button onclick="feedBunny()">🥕 Feed</button>
            <button id="sleep-btn" onclick="goSleep()">💤 Sleep</button>
            <button id="wake-btn" onclick="wakeUp()">☀️ WAKE UP</button>
        </div>
        <div id="bunny-sprite">🐰<div id="friend-sprite"></div></div>
        <div class="panel">
            <button onclick="openShop()">🛍️ SHOP</button>
            <button onclick="showHome()" style="background:#aaa;">SAVE</button>
        </div>
    </div>
    <script>
        let currentGameId = null;
        let stats = { hunger: 100, coins: 75, name: "", level: 1, xp: 0, friend: "", hasSitter: false };
        function updateUI() {
            if (!currentGameId) return;
            document.getElementById('stats').innerText = `Hunger: ${stats.hunger} | Coins: ${stats.coins}`;
            document.getElementById('current-game-name').innerText = stats.name;
            document.getElementById('shop-coins').innerText = `Coins: ${stats.coins}`;
            document.getElementById('lvl-display').innerText = `Lvl ${stats.level}`;
            document.getElementById('friend-sprite').innerText = stats.friend || "";
            if (stats.hasSitter && !document.getElementById('real-sitter')) {
                const s = document.createElement('div');
                s.id = 'real-sitter'; s.className = 'sitter-style'; s.innerText = '👩‍🍼';
                document.getElementById('bunny-sprite').appendChild(s);
                document.getElementById('sitterBtn').innerText = "Sitter Hired! ✅";
            }
            let xpNeeded = stats.level * 100;
            document.getElementById('xp-fill').style.width = Math.min(100, (stats.xp / xpNeeded) * 100) + "%";
            if (stats.level >= 10) document.getElementById('pet-shop').style.display = "block";
        }
        function addXP(amount) {
            stats.xp += amount;
            if (stats.xp >= (stats.level * 100)) { stats.xp = 0; stats.level++; stats.coins += 50; alert("LEVEL UP!"); }
            updateUI(); saveGame();
        }
        function createNewGame() {
            const name = document.getElementById('saveName').value || "Pet";
            const id = "snowball_" + Date.now();
            localStorage.setItem(id, JSON.stringify({...stats, name: name}));
            renderSaveList();
        }
        function renderSaveList() {
            const list = document.getElementById('saveList'); list.innerHTML = "";
            for (let i = 0; i < localStorage.length; i++) {
                const id = localStorage.key(i);
                if (id && id.startsWith("snowball_")) {
                    const data = JSON.parse(localStorage.getItem(id));
                    const btn = document.createElement('button');
                    btn.innerText = `${data.name} (Lvl ${data.level})`;
                    btn.onclick = () => loadGame(id);
                    list.appendChild(btn);
                }
            }
        }
        function loadGame(id) {
            currentGameId = id; stats = JSON.parse(localStorage.getItem(id));
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            updateUI();
        }
        function saveGame() { if (currentGameId) localStorage.setItem(currentGameId, JSON.stringify(stats)); }
        function openShop() { document.getElementById('shop-screen').style.display = 'flex'; updateUI(); }
        function closeShop() { document.getElementById('shop-screen').style.display = 'none'; }
        function buyFood() { if (stats.coins >= 20) { stats.coins -= 20; updateUI(); saveGame(); } }
        function useGym() { if (stats.coins >= 5) { stats.coins -= 5; addXP(20); } }
        function doWork() { stats.coins += 10; updateUI(); saveGame(); }
        function buySitter() { if (stats.coins >= 100 && !stats.hasSitter) { stats.coins -= 100; stats.hasSitter = true; updateUI(); saveGame(); } }
        function buyFriend(e) { if (stats.coins >= 200) { stats.coins -= 200; stats.friend = e; updateUI(); saveGame(); } }
        function feedBunny() { if (stats.hunger < 100) { stats.hunger = Math.min(100, stats.hunger + 20); addXP(20); } }
        function goSleep() {
            document.body.classList.add('night');
            document.getElementById('sleep-btn').style.display = 'none';
            document.getElementById('wake-btn').style.display = 'inline-block';
            stats.coins += 30; saveGame(); updateUI();
        }
        function wakeUp() {
            document.body.classList.remove('night');
            document.getElementById('sleep-btn').style.display = 'inline-block';
            document.getElementById('wake-btn').style.display = 'none';
            saveGame();
        }
        function showHome() { saveGame(); location.reload(); }
        setInterval(() => {
            if (currentGameId && !document.body.classList.contains('night')) {
                if (stats.hasSitter) stats.hunger = 100;
                else stats.hunger = Math.max(0, stats.hunger - 2);
                updateUI(); saveGame();
            }
        }, 3000);
        renderSaveList();
    </script>
</body>
</html>
